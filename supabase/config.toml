project_id = "supapara"

[api]
port = 54321
schemas = ["public"]

[db]
port = 54322

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

[auth.external.google]
enabled = true
# Real values live in the cloud project's auth settings (dashboard).
# These env-var placeholders satisfy the CLI's local validator only.
client_id = "env(GOOGLE_CLIENT_ID)"
secret    = "env(GOOGLE_CLIENT_SECRET)"
